<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Space Grotesk';font-weight:700;src:url('fonts/spacegrotesk-700.woff2') format('woff2')}
@font-face{font-family:'Inter';font-weight:500;src:url('fonts/inter-500.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080f}
.b{position:relative;width:1200px;height:630px;overflow:hidden;
  background:radial-gradient(900px 600px at 22% -25%,#1a2350 0%,transparent 60%),
             radial-gradient(820px 580px at 88% 130%,#241a45 0%,transparent 55%),#06080f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
  font-family:'Inter',system-ui,sans-serif;text-align:center}
.aur{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45;z-index:0}
.a1{width:420px;height:420px;background:radial-gradient(circle,#5865F2,transparent 64%);top:-150px;left:60px}
.a2{width:400px;height:400px;background:radial-gradient(circle,#a78bfa,transparent 64%);bottom:-170px;right:90px}
.row{display:flex;align-items:center;gap:46px;z-index:1}
.tile{width:188px;height:188px;border-radius:42px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 18px 60px rgba(0,0,0,.5)}
.dc{background:#5865F2}
.cb{background:linear-gradient(135deg,#22d3ee 0%,#5ea0f2 50%,#a78bfa 100%)}
.dc svg{width:112px;height:84px;fill:#fff}
.cb svg{width:120px;height:120px}
.x{font-family:'Space Grotesk';font-weight:700;font-size:60px;color:#90a0bd;z-index:1}
.ttl{font-family:'Space Grotesk';font-weight:700;font-size:62px;letter-spacing:-.02em;line-height:1;z-index:1;
  background:linear-gradient(110deg,#5865F2,#22d3ee 55%,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:#e8ecf6;font-size:25px;font-weight:500;z-index:1}
.inv{z-index:1;font-family:'Space Grotesk';font-weight:700;font-size:27px;color:#fff;
  background:#5865F2;border-radius:999px;padding:12px 30px}
.url{position:absolute;bottom:26px;right:40px;z-index:1;font-family:'Space Grotesk';font-weight:700;font-size:20px;color:#90a0bd}
.url b{color:#e8ecf6}
</style></head>
<body>

</body></html>

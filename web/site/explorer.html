<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cereblix Explorer - CRB blockchain explorer</title>
<meta name="theme-color" content="#06080f">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@font-face{font-family:'Space Grotesk';font-weight:500;font-display:swap;src:url('fonts/spacegrotesk-500.woff2') format('woff2')}
@font-face{font-family:'Space Grotesk';font-weight:700;font-display:swap;src:url('fonts/spacegrotesk-700.woff2') format('woff2')}
@font-face{font-family:'Inter';font-weight:400;font-display:swap;src:url('fonts/inter-400.woff2') format('woff2')}
@font-face{font-family:'Inter';font-weight:500;font-display:swap;src:url('fonts/inter-500.woff2') format('woff2')}
@font-face{font-family:'Inter';font-weight:700;font-display:swap;src:url('fonts/inter-700.woff2') format('woff2')}
:root{--bg:#06080f;--panel:#0e1424;--glass:rgba(146,180,255,.05);--border:rgba(146,180,255,.13);--border2:rgba(120,200,255,.35);--acc:#22d3ee;--acc2:#a78bfa;--txt:#e8ecf6;--mut:#90a0bd;--ok:#34d399;--err:#f87171;--fd:'Space Grotesk',system-ui,sans-serif;--grad:linear-gradient(115deg,var(--acc),var(--acc2))}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:15.5px/1.6 'Inter',system-ui,Segoe UI,Roboto,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
html{overflow-x:hidden}
::selection{background:rgba(34,211,238,.28)}
.bg{position:fixed;inset:0;z-index:-2;overflow:hidden;background:radial-gradient(1100px 680px at 50% -12%,#13234a 0%,transparent 60%),radial-gradient(760px 520px at 100% -4%,#1c1440 0%,transparent 55%),var(--bg)}
.aurora{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;will-change:transform}
.aurora.a1{width:460px;height:460px;background:radial-gradient(circle,#22d3ee,transparent 64%);top:-170px;left:-90px;animation:dr1 24s ease-in-out infinite}
.aurora.a2{width:430px;height:430px;background:radial-gradient(circle,#a78bfa,transparent 64%);top:-130px;right:-110px;animation:dr2 28s ease-in-out infinite}
@keyframes dr1{50%{transform:translate(50px,40px) scale(1.1)}}
@keyframes dr2{50%{transform:translate(-45px,50px) scale(1.06)}}
@media(prefers-reduced-motion:reduce){.aurora{animation:none}}
.wrap{max-width:1040px;margin:0 auto;padding:0 16px 60px}
.logo{flex:0 0 auto;display:block;cursor:pointer}
nav{display:flex;align-items:center;gap:14px;padding:14px 0;flex-wrap:wrap}
nav .brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--txt);cursor:pointer}
nav .brand .logo{width:34px;height:34px;filter:drop-shadow(0 4px 13px rgba(34,211,238,.4))}
nav .brand b{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:-.01em}
nav .brand b i{font-style:normal;color:var(--acc2)}
nav .links{margin-left:auto;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
nav .links a{color:var(--mut);text-decoration:none;font-size:14.5px;font-weight:500;cursor:pointer;white-space:nowrap}
nav .links a:hover,nav .links a.active{color:var(--acc)}
.subnav{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 12px}
.subnav a{color:var(--mut);text-decoration:none;font-size:13.5px;cursor:pointer;border:1px solid var(--border);border-radius:20px;padding:5px 13px;background:var(--glass)}
.subnav a:hover{color:var(--acc);border-color:var(--border2)}
.mono{word-break:break-all}
@media(max-width:560px){nav .links{margin-left:0;width:100%;gap:15px;overflow-x:auto}.kv{grid-template-columns:1fr!important;gap:2px 0!important}.kv div:nth-child(even){margin-bottom:6px}}
.langsw{display:inline-flex;gap:2px;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--glass)}
.langsw button{background:transparent;color:var(--mut);border:0;padding:5px 10px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.langsw button.on{background:var(--grad);color:#06121f}
a{color:var(--acc);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
.search{display:flex;gap:8px;margin:18px 0}
.search input{flex:1;background:#0b1120;border:1px solid var(--border);border-radius:11px;color:var(--txt);padding:13px 14px;font-size:15px;font-family:ui-monospace,Consolas,monospace}
.search input:focus{outline:none;border-color:var(--acc)}
.search button{background:var(--grad);border:0;color:#06121f;font-family:var(--fd);font-weight:700;padding:0 22px;border-radius:11px;cursor:pointer;box-shadow:0 8px 22px -8px rgba(34,211,238,.5)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(120px,100%),1fr));gap:10px;margin-bottom:18px}
.stat{position:relative;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;backdrop-filter:blur(8px);overflow:hidden}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:.75}
.stat b{display:block;font-family:var(--fd);font-size:20px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat span{color:var(--mut);font-size:12px}
.card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;backdrop-filter:blur(8px);overflow-x:auto}
.card h2{font-family:var(--fd);font-size:17px;margin-bottom:12px;color:#e8ecf6;display:flex;align-items:center;gap:8px}
.card h2 .tag{font-size:12px;font-weight:600;color:var(--mut);margin-left:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
td,th{padding:9px 6px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
th{color:var(--mut);font-weight:600}
tr:last-child td{border-bottom:0}
.mono{font-family:ui-monospace,Consolas,monospace;font-size:13px}
.kv{display:grid;grid-template-columns:160px 1fr;gap:7px 14px;font-size:14px}
.kv div:nth-child(odd){color:var(--mut)}
.kv .mono{word-break:break-all}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.pill.in{background:#10331f;color:var(--ok)}
.pill.out{background:#3a1d1d;color:var(--err)}
.pill.cb{background:#241a3a;color:var(--acc2)}
.pill.ok{background:#0f3326;color:var(--ok)}
.pill.wait{background:#3a3214;color:#fbbf24}
.err{color:var(--err);padding:14px;background:#2a1414;border:1px solid #5a2020;border-radius:10px}
.muted{color:var(--mut)}
.back{font-size:14px;margin-bottom:10px;display:inline-block}
.copy{font-size:11px;color:var(--mut);border:1px solid var(--border);border-radius:6px;padding:1px 6px;margin-left:6px;cursor:pointer}
.copy:hover{color:var(--acc);border-color:var(--acc)}
.pager{display:flex;gap:8px;justify-content:center;margin-top:12px}
.pager button{background:var(--glass);border:1px solid var(--border);color:var(--txt);border-radius:9px;padding:7px 15px;cursor:pointer}
.pager button:disabled{opacity:.4;cursor:default}
.big{font-family:var(--fd);font-size:26px;font-weight:700;color:var(--acc)}
</style>
</head>
<body>
<div class="bg" aria-hidden="true"><div class="aurora a1"></div><div class="aurora a2"></div></div>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs></svg>
<div class="wrap">
<nav>
  <a class="brand" onclick="showHome()"><svg class="logo" viewBox="0 0 40 40" fill="none" aria-hidden="true"><rect x="2" y="2" width="36" height="36" rx="11" fill="url(#lg)"/><path d="M14 8C27 13 27 16 20 20 13 24 13 27 26 32" stroke="#06121f" stroke-width="2.5" stroke-linecap="round"/><path d="M26 8C13 13 13 16 20 20 27 24 27 27 14 32" stroke="#06121f" stroke-width="2.5" stroke-linecap="round"/></svg><b>Cereb<i>lix</i></b></a>
  <div class="links">
    <a href="./" data-t="home">Home</a>
    <a href="./#mine" data-t="mine">Mine</a>
    <a href="pool.html" data-t="pool">Pool</a>
    <a onclick="showHome()" class="active" data-t="explorer">Explorer</a>
    <a href="wallet/" data-t="wallet">Wallet</a>
    <a href="faucet.html" data-t="faucet">Faucet</a>
    <a href="./#roadmap" data-t="roadmap">Roadmap</a>
    <a href="https://github.com/Cereblix/cereblix" target="_blank" rel="noopener">GitHub</a>
    <span class="langsw"><button data-lang="en" onclick="setLang('en')">EN</button><button data-lang="ru" onclick="setLang('ru')">RU</button></span>
  </div>
</nav>

<div class="search">
  <input id="q" autofocus>
  <button onclick="doSearch()" data-t="find">Search</button>
</div>
<div class="subnav">
  <a onclick="showHome()" data-t="latest">Latest blocks</a>
  <a onclick="showRich()" data-t="rich">Rich list</a>
  <a onclick="showMempool()" data-t="mempool">Mempool</a>
</div>

<div class="stats" id="stats"></div>
<div id="view"></div>
</div>

<script>
const T = {
  en:{home:"Home",mine:"Mine",pool:"Pool",about:"About",explorer:"Explorer",rich:"Rich list",mempool:"Mempool",wallet:"Wallet",faucet:"Faucet",roadmap:"Roadmap",find:"Search",
    ph:"Search: height / block hash / txid / crb1 address…",
    st_height:"height",st_hr:"MH/s network",st_supply:"CRB supply",st_reward:"reward",st_epoch:"epoch",st_age:"last block",st_mp:"mempool",
    node_down:"node unavailable",latest:"Latest blocks",auto10:"refresh every 10s",
    c_time:"time",c_hash:"hash",c_tx:"tx",c_miner:"miner",c_reward:"reward",c_from:"from",c_to:"to",c_amount:"amount",c_fee:"fee",c_block:"block",c_type:"type",c_peer:"counterparty",c_txid:"txid",
    block:"Block",conf:"conf.",prevblock:"prev block",depth:"depth",txn:"transactions",outsum:"total outputs",fees:"fees",target:"target",nonce:"nonce",txroot:"tx root",
    txs:"Transactions",last:"latest",backblocks:"← back to latest blocks",backhome:"← back",
    tx:"Transaction",status:"status",pending:"in mempool (0 conf.)",confirmedin:"confirmations in block",time:"time",coinbase:"coinbase (issuance)",
    address:"Address",balance:"balance",unconf:"unconfirmed balance",received:"received",mined:"mined",sent:"sent",ntx:"transactions",nonce2:"nonce",txhist:"Transaction history",
    notx:"no transactions",send:"send",recv:"receive",mining:"mining",page:"page",of:"of",newer:"← newer",older:"older →",loadmore:"Load more",loadolder:"Load older blocks ↓",showing:"showing",
    rich_t:"Richest addresses",share:"share",you:"you",mp_t:"Mempool (unconfirmed)",mp_empty:"mempool is empty - all transactions confirmed",
    notfound:"Nothing found",copy:"copy"},
  ru:{home:"Главная",mine:"Майнинг",pool:"Пул",about:"О проекте",explorer:"Обозреватель",rich:"Богатейшие",mempool:"Мемпул",wallet:"Кошелёк",faucet:"Кран",roadmap:"Дорожная карта",find:"Найти",
    ph:"Поиск: высота / хэш блока / txid / адрес crb1…",
    st_height:"высота",st_hr:"MH/s сети",st_supply:"CRB эмиссия",st_reward:"награда",st_epoch:"эпоха",st_age:"посл. блок",st_mp:"мемпул",
    node_down:"нода недоступна",latest:"Последние блоки",auto10:"обновление каждые 10 с",
    c_time:"время",c_hash:"хэш",c_tx:"tx",c_miner:"майнер",c_reward:"награда",c_from:"от",c_to:"кому",c_amount:"сумма",c_fee:"комиссия",c_block:"блок",c_type:"тип",c_peer:"контрагент",c_txid:"txid",
    block:"Блок",conf:"подтв.",prevblock:"пред. блок",depth:"глубина",txn:"транзакций",outsum:"сумма выходов",fees:"комиссии",target:"target",nonce:"nonce",txroot:"tx root",
    txs:"Транзакции",last:"последний",backblocks:"← к последним блокам",backhome:"← назад",
    tx:"Транзакция",status:"статус",pending:"в мемпуле (0 подтв.)",confirmedin:"подтверждений в блоке",time:"время",coinbase:"coinbase (эмиссия)",
    address:"Адрес",balance:"баланс",unconf:"неподтверждённый баланс",received:"получено",mined:"намайнено",sent:"отправлено",ntx:"транзакций",nonce2:"nonce",txhist:"История транзакций",
    notx:"нет транзакций",send:"отправка",recv:"получение",mining:"майнинг",page:"стр.",of:"из",newer:"← новее",older:"старее →",loadmore:"Показать ещё",loadolder:"Показать старее ↓",showing:"показано",
    rich_t:"Богатейшие адреса",share:"доля",you:"вы",mp_t:"Мемпул (неподтверждённые)",mp_empty:"мемпул пуст - все транзакции подтверждены",
    notfound:"Ничего не найдено",copy:"копировать"}
};
let LANG = (function(){ const s=localStorage.getItem('lang'); return (s==='ru'||s==='en')?s:((navigator.language||'en').toLowerCase().startsWith('ru')?'ru':'en'); })();
const t = k => (T[LANG][k] ?? T.en[k] ?? k);
function setLang(l){ LANG=l; localStorage.setItem('lang',l); applyChrome(); route(); }
function applyChrome(){
  document.documentElement.lang = LANG;
  document.querySelectorAll('[data-t]').forEach(el=>el.textContent=t(el.getAttribute('data-t')));
  document.getElementById('q').placeholder = t('ph');
  document.querySelectorAll('.langsw button').forEach(b=>b.classList.toggle('on', b.dataset.lang===LANG));
}

const API = 'api';
const UNIT = 1e8;
const $ = id => document.getElementById(id);
const loc = () => LANG==='ru'?'ru-RU':'en-US';
const fmt = v => (v/UNIT).toLocaleString(loc(),{maximumFractionDigits:8}) + ' CRB';
const tstr = ts => new Date(ts*1000).toLocaleString(loc());
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// escape a value for safe embedding inside a single-quoted JS string in an inline
// handler attribute (defense-in-depth: addresses/hashes are node-normalized, but
// explorer shares an origin with the wallet, so an injection here could read keys)
const js = s => esc(String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"));
const short = (s,n=16) => s && s.length > n+4 ? s.slice(0,n)+'…' : s;
let netHeight = 0;

async function api(path){
  const r = await fetch(API + path + (path.includes('?')?'&':'?') + '_=' + Date.now(), {cache:'no-store'});
  const j = await r.json();
  if (j && j.error) throw new Error(j.error);
  return j;
}
const aBlock = (h,txt) => `<a onclick="showBlock(${Number(h)||0})">${esc(txt)}</a>`;
const aTx = (id,txt) => `<a onclick="showTx('${js(id)}')">${esc(txt)}</a>`;
const aAddr = (ad,txt) => `<a onclick="showAddr('${js(ad)}')">${esc(txt)}</a>`;
const copy = s => `<span class="copy" onclick="navigator.clipboard.writeText('${js(s)}')">${t('copy')}</span>`;

async function loadStats(){
  try{
    const s = await api('/status');
    netHeight = s.height;
    $('stats').innerHTML = `
      <div class="stat"><b>${s.height.toLocaleString(loc())}</b><span>${t('st_height')}</span></div>
      <div class="stat"><b>${((+s.hashrate||0)/1e6).toLocaleString(loc(),{minimumFractionDigits:2,maximumFractionDigits:2})}</b><span>${t('st_hr')}</span></div>
      <div class="stat"><b>${(s.supply/UNIT).toLocaleString(loc(),{maximumFractionDigits:0})}</b><span>${t('st_supply')}</span></div>
      <div class="stat"><b>${(s.reward/UNIT)}</b><span>${t('st_reward')}</span></div>
      <div class="stat"><b>${s.epoch}</b><span>${t('st_epoch')}</span></div>
      <div class="stat"><b>${s.block_age}${LANG==='ru'?'с':'s'}</b><span>${t('st_age')}</span></div>
      <div class="stat"><b>${s.mempool}</b><span>${t('st_mp')}</span></div>`;
  }catch(e){ $('stats').innerHTML = `<div class="err">${t('node_down')}: ${esc(e.message)}</div>`; }
}

let homeState = {blocks:[], expanded:false, loading:false};
async function showHome(){
  location.hash = '';
  try{
    const blocks = await api('/blocks?last=20');
    homeState = {blocks: blocks||[], expanded:false, loading:false};
    renderHome();
  }catch(e){ $('view').innerHTML = `<div class="err">${esc(e.message)}</div>`; }
}
function renderHome(){
  const {blocks, loading} = homeState;
  const rows = blocks.map(b => `<tr>
    <td>${aBlock(b.height,'#'+b.height)}</td>
    <td>${tstr(b.time)}</td>
    <td class="mono">${aBlock(b.height,short(b.hash,18))}</td>
    <td>${b.txs}</td>
    <td class="mono">${aAddr(b.miner,short(b.miner,14))}</td>
    <td>${fmt(b.reward)}</td></tr>`).join('');
  const oldest = blocks.length ? blocks[blocks.length-1].height : 0;
  $('view').innerHTML = `<div class="card"><h2>${t('latest')}<span class="tag">${t('auto10')}</span></h2>
    <table><tr><th>#</th><th>${t('c_time')}</th><th>${t('c_hash')}</th><th>${t('c_tx')}</th><th>${t('c_miner')}</th><th>${t('c_reward')}</th></tr>${rows}</table>
    ${oldest>0?`<div class="pager"><button onclick="loadOlderBlocks()" ${loading?'disabled':''}>${t('loadolder')}</button></div>`:''}</div>`;
}
async function loadOlderBlocks(){
  const {blocks, loading} = homeState;
  if(loading || !blocks.length) return;
  const oldest = blocks[blocks.length-1].height;
  if(oldest<=0) return;
  homeState.expanded = true; homeState.loading = true; renderHome();
  try{
    const more = await api('/blocks?last=20&before='+oldest);
    homeState.blocks = blocks.concat(more||[]);
  }catch(e){}
  homeState.loading = false; renderHome();
}

async function showBlock(h){
  if (h < 0) return;
  location.hash = 'block/'+h;
  try{
    const b = await api('/block?h='+h);
    const hash = blockHash(b);
    const conf = netHeight - b.height + 1;
    const totalOut = b.txs.reduce((s,x)=>s+x.amount,0);
    const fees = b.txs.filter(x=>x.from_pub).reduce((s,x)=>s+x.fee,0);
    const txs = b.txs.map((x,i)=>{
      const cb = !x.from_pub;
      const from = cb ? 'coinbase' : addrOf(x.from_pub);
      return `<tr><td>${i}</td>
        <td class="mono">${aTx(txId(x),short(txId(x),14))}</td>
        <td>${cb?'<span class="pill cb">coinbase</span>':aAddr(from,short(from,14))}</td>
        <td class="mono">${aAddr(x.to,short(x.to,14))}</td>
        <td>${fmt(x.amount)}</td><td>${fmt(x.fee)}</td></tr>`;
    }).join('');
    $('view').innerHTML = `<a class="back" onclick="showHome()">${t('backblocks')}</a>
      <div class="card"><h2>${t('block')} #${b.height}<span class="tag">${conf} ${t('conf')}</span></h2>
      <div class="kv">
        <div>${t('c_hash')}</div><div class="mono">${esc(hash)}${copy(hash)}</div>
        <div>${t('prevblock')}</div><div class="mono">${b.height>0?aBlock(b.height-1,b.prev):esc(b.prev)}</div>
        <div>${t('time')}</div><div>${tstr(b.time)} <span class="muted">(${t('depth')} ${netHeight-b.height})</span></div>
        <div>${t('txn')}</div><div>${b.txs.length}</div>
        <div>${t('outsum')}</div><div>${fmt(totalOut)}</div>
        <div>${t('fees')}</div><div>${fmt(fees)}</div>
        <div>${t('target')}</div><div class="mono">${esc(b.target)}</div>
        <div>${t('nonce')}</div><div>${b.nonce}</div>
        <div>${t('txroot')}</div><div class="mono">${esc(b.txroot)}</div>
      </div></div>
      <div class="card"><h2>${t('txs')} (${b.txs.length})</h2><table>
        <tr><th>#</th><th>${t('c_txid')}</th><th>${t('c_from')}</th><th>${t('c_to')}</th><th>${t('c_amount')}</th><th>${t('c_fee')}</th></tr>${txs}</table></div>
      <div class="pager">
        <button onclick="showBlock(${b.height-1})" ${b.height===0?'disabled':''}>← #${b.height-1}</button>
        <button onclick="showBlock(${b.height+1})" ${b.height>=netHeight?'disabled':''}>#${b.height+1} →</button>
        <button onclick="showBlock(${netHeight})">${t('last')}</button>
      </div>`;
  }catch(e){ $('view').innerHTML = `<a class="back" onclick="showHome()">${t('backhome')}</a><div class="err">${esc(e.message)}</div>`; }
}

async function showTx(id){
  location.hash = 'tx/'+id;
  try{
    const x = await api('/tx?id='+id);
    const conf = x.pending ? 0 : (netHeight - x.height + 1);
    const status = x.pending
      ? `<span class="pill wait">${t('pending')}</span>`
      : `<span class="pill ok">${conf} ${t('confirmedin')}</span> ${aBlock(x.height,'#'+x.height)}`;
    $('view').innerHTML = `<a class="back" onclick="showHome()">${t('backblocks')}</a>
      <div class="card"><h2>${t('tx')}</h2><div class="kv">
        <div>${t('c_txid')}</div><div class="mono">${esc(x.txid)}${copy(x.txid)}</div>
        <div>${t('status')}</div><div>${status}</div>
        ${x.pending?'':`<div>${t('time')}</div><div>${tstr(x.time)}</div>
        <div>${t('c_block')}</div><div class="mono">${aBlock(x.height,x.block_hash)}</div>`}
        <div>${t('c_from')}</div><div class="mono">${x.coinbase?'<span class="pill cb">'+t('coinbase')+'</span>':aAddr(x.from,x.from)}</div>
        <div>${t('c_to')}</div><div class="mono">${aAddr(x.to,x.to)}</div>
        <div>${t('c_amount')}</div><div class="big">${fmt(x.amount)}</div>
        <div>${t('c_fee')}</div><div>${fmt(x.fee)}</div>
        <div>${t('nonce')}</div><div>${x.nonce}</div>
      </div></div>`;
  }catch(e){ $('view').innerHTML = `<a class="back" onclick="showHome()">${t('backhome')}</a><div class="err">${esc(e.message)}</div>`; }
}

// Address history is fetched from the node in pages (HIST_PAGE at a time) on
// demand, so even an address with thousands of txns is fully viewable without
// the node ever returning a giant payload. `total` (b.txn) is the exact
// confirmed count; pending mempool txns are shown on top and counted separately.
const HIST_PAGE = 50;
let addrState = {addr:'', pending:[], conf:[], total:0, loading:false};
async function showAddr(addr){
  location.hash = 'addr/'+addr;
  try{
    const b = await api('/balance?addr='+addr);
    let mp = []; try { mp = await api('/mempool') || []; } catch(e){}
    let delta = 0;
    const pend = (mp||[]).filter(x => x.to===addr || addrOf(x.from_pub)===addr).map(x => {
      const from = addrOf(x.from_pub);
      delta += (from===addr) ? -(x.amount + x.fee) : x.amount;
      return { pending:true, from, to:x.to, amount:x.amount, fee:x.fee, txid:txId(x) };
    });
    const conf = await api('/history?addr='+addr+'&limit='+HIST_PAGE+'&offset=0').catch(()=>[]);
    // Lifetime totals come from the node (full-chain scan), not from the page.
    const recv = b.received||0, sent = b.sent||0, mined = b.mined||0;
    const total = b.txn!=null ? b.txn : (conf||[]).length;
    addrState = {addr, pending:pend, conf:(conf||[]), total, loading:false};
    const uncRow = delta!==0
      ? `<div>${t('unconf')}</div><div class="big">${fmt(b.balance+delta)} <span class="pill wait">${pend.length} ${t('pending')}</span></div>`
      : '';
    $('view').innerHTML = `<a class="back" onclick="showHome()">${t('backblocks')}</a>
      <div class="card"><h2>${t('address')}</h2><div class="kv">
        <div>${t('address')}</div><div class="mono">${esc(addr)}${copy(addr)}</div>
        <div>${t('balance')}</div><div class="big">${fmt(b.balance)}</div>
        ${uncRow}
        <div>${t('received')}</div><div>${fmt(recv)} <span class="muted">(${t('mined')} ${fmt(mined)})</span></div>
        <div>${t('sent')}</div><div>${fmt(sent)}</div>
        <div>${t('ntx')}</div><div>${total}</div>
        <div>${t('nonce2')}</div><div>${b.nonce}</div>
      </div></div>
      <div class="card"><h2>${t('txhist')}<span class="tag">${total} ${t('ntx')}</span></h2><div id="histbox"></div></div>`;
    renderHist();
  }catch(e){ $('view').innerHTML = `<a class="back" onclick="showHome()">${t('backhome')}</a><div class="err">${esc(e.message)}</div>`; }
}
function renderHist(){
  const {addr, pending, conf, total, loading} = addrState;
  const items = pending.concat(conf);
  const rows = items.map(h=>{
    const out = h.from === addr;
    const peer = out ? h.to : h.from;
    const typ = out ? t('send') : (h.from==='coinbase'?t('mining'):t('recv'));
    const blk = h.pending ? `<span class="pill wait">${t('pending')}</span>` : aBlock(h.height,'#'+h.height);
    return `<tr${h.pending?' style="opacity:.85"':''}><td>${blk}</td>
      <td>${h.pending?'—':tstr(h.time)}</td>
      <td><span class="pill ${out?'out':'in'}">${typ}</span></td>
      <td class="mono">${peer==='coinbase'?'<span class="pill cb">coinbase</span>':aAddr(peer,short(peer,14))}</td>
      <td class="mono">${aTx(h.txid,short(h.txid,10))}</td>
      <td>${out?'−':'+'}${fmt(h.amount)}</td></tr>`;
  }).join('') || `<tr><td colspan="6" class="muted">${t('notx')}</td></tr>`;
  const more = conf.length < total;
  $('histbox').innerHTML = `<table>
    <tr><th>${t('c_block')}</th><th>${t('c_time')}</th><th>${t('c_type')}</th><th>${t('c_peer')}</th><th>${t('c_txid')}</th><th>${t('c_amount')}</th></tr>${rows}</table>
    <div class="pager">
      <span class="muted" style="align-self:center">${t('showing')} ${conf.length} ${t('of')} ${total}${pending.length?` (+${pending.length} ${t('pending')})`:''}</span>
      ${more?`<button onclick="loadMoreHist()" ${loading?'disabled':''}>${t('loadmore')}</button>`:''}
    </div>`;
}
async function loadMoreHist(){
  if(addrState.loading || addrState.conf.length>=addrState.total) return;
  addrState.loading = true; renderHist();
  try{
    const more = await api('/history?addr='+addrState.addr+'&limit='+HIST_PAGE+'&offset='+addrState.conf.length);
    const seen = new Set(addrState.conf.map(h=>h.txid));
    addrState.conf = addrState.conf.concat((more||[]).filter(h=>!seen.has(h.txid)));
  }catch(e){}
  addrState.loading = false; renderHist();
}

const RICH_PAGE = 100;
let richState = {list:[], supply:1, loading:false, done:false};
async function showRich(){
  location.hash = 'rich';
  try{
    const supply = (await api('/status')).supply || 1;
    const list = await api('/richlist?n='+RICH_PAGE+'&offset=0');
    richState = {list:(list||[]), supply, loading:false, done:(list||[]).length<RICH_PAGE};
    renderRich();
  }catch(e){ $('view').innerHTML = `<div class="err">${esc(e.message)}</div>`; }
}
function renderRich(){
  const {list, supply, loading, done} = richState;
  const rows = list.map((e,i)=>`<tr><td>${i+1}</td>
    <td class="mono">${aAddr(e.address,e.address)}</td>
    <td>${fmt(e.balance)}</td>
    <td>${(e.balance/supply*100).toFixed(2)}%</td></tr>`).join('');
  $('view').innerHTML = `<div class="card"><h2>${t('rich_t')}<span class="tag">${list.length}</span></h2>
    <table><tr><th>#</th><th>${t('address')}</th><th>${t('balance')}</th><th>${t('share')}</th></tr>${rows}</table>
    ${!done?`<div class="pager"><button onclick="loadMoreRich()" ${loading?'disabled':''}>${t('loadmore')}</button></div>`:''}</div>`;
}
async function loadMoreRich(){
  if(richState.loading || richState.done) return;
  richState.loading = true; renderRich();
  try{
    const more = await api('/richlist?n='+RICH_PAGE+'&offset='+richState.list.length);
    richState.list = richState.list.concat(more||[]);
    if(!more || more.length<RICH_PAGE) richState.done = true;
  }catch(e){}
  richState.loading = false; renderRich();
}

// Mempool is fetched once (it is bounded by mempool policy) and paged on the
// client, so a large backlog never renders thousands of DOM rows at once.
const MP_PAGE = 50;
let mpState = {list:[], page:0};
async function showMempool(){
  location.hash = 'mempool';
  try{
    const mp = await api('/mempool');
    mpState = {list:(mp||[]), page:0};
    renderMempool();
  }catch(e){ $('view').innerHTML = `<div class="err">${esc(e.message)}</div>`; }
}
function renderMempool(){
  const {list, page} = mpState;
  const per = MP_PAGE, start = page*per, items = list.slice(start, start+per);
  const rows = items.map(x=>{
    const from = addrOf(x.from_pub);
    return `<tr><td class="mono">${aTx(txId(x),short(txId(x),16))}</td>
      <td class="mono">${aAddr(from,short(from,14))}</td>
      <td class="mono">${aAddr(x.to,short(x.to,14))}</td>
      <td>${fmt(x.amount)}</td><td>${fmt(x.fee)}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="muted">${t('mp_empty')}</td></tr>`;
  const pages = Math.ceil(list.length/per) || 1;
  $('view').innerHTML = `<div class="card"><h2>${t('mp_t')}<span class="tag">${list.length}</span></h2>
    <table><tr><th>${t('c_txid')}</th><th>${t('c_from')}</th><th>${t('c_to')}</th><th>${t('c_amount')}</th><th>${t('c_fee')}</th></tr>${rows}</table>
    ${pages>1?`<div class="pager">
      <button onclick="mpPage(-1)" ${page===0?'disabled':''}>${t('newer')}</button>
      <span class="muted" style="align-self:center">${t('page')} ${page+1} ${t('of')} ${pages}</span>
      <button onclick="mpPage(1)" ${page>=pages-1?'disabled':''}>${t('older')}</button></div>`:''}</div>`;
}
function mpPage(d){ mpState.page += d; renderMempool(); }

async function doSearch(){
  const q = $('q').value.trim();
  if(!q) return;
  try{
    const r = await api('/search?q='+encodeURIComponent(q));
    if(r.type==='address') showAddr(r.value);
    else if(r.type==='tx') showTx(r.value);
    else if(r.type==='block') showBlock(r.height);
  }catch(e){ $('view').innerHTML = `<div class="err">${t('notfound')}: ${esc(e.message)}</div>`; }
}
$('q').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

function sha256(data){
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const len=data.length,bitLen=len*8,padded=new Uint8Array(((len+8)>>6<<6)+64);
  padded.set(data);padded[len]=0x80;const dv=new DataView(padded.buffer);
  dv.setUint32(padded.length-8,Math.floor(bitLen/0x100000000));dv.setUint32(padded.length-4,bitLen>>>0);
  const w=new Int32Array(64),rr=(x,n)=>(x>>>n)|(x<<(32-n));
  for(let i=0;i<padded.length;i+=64){
    for(let t2=0;t2<16;t2++)w[t2]=dv.getInt32(i+t2*4);
    for(let t2=16;t2<64;t2++){const s0=rr(w[t2-15],7)^rr(w[t2-15],18)^(w[t2-15]>>>3),s1=rr(w[t2-2],17)^rr(w[t2-2],19)^(w[t2-2]>>>10);w[t2]=(w[t2-16]+s0+w[t2-7]+s1)|0;}
    let[a,b,c,d,e,f,g,h]=H;
    for(let t2=0;t2<64;t2++){const S1=rr(e,6)^rr(e,11)^rr(e,25),ch=(e&f)^(~e&g),t1=(h+S1+ch+K[t2]+w[t2])|0,S0=rr(a,2)^rr(a,13)^rr(a,22),mj=(a&b)^(a&c)^(b&c),t22=(S0+mj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t22)|0;}
    H=H.map((x,j)=>(x+[a,b,c,d,e,f,g,h][j])|0);
  }
  const out=new Uint8Array(32),ov=new DataView(out.buffer);H.forEach((x,j)=>ov.setInt32(j*4,x));return out;
}
const hexstr=b=>Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
const unhex=s=>new Uint8Array(s.match(/.{2}/g).map(x=>parseInt(x,16)));
const enc=new TextEncoder();
function addrOf(pubHex){ return pubHex ? 'crb1'+hexstr(sha256(unhex(pubHex)).slice(0,20)) : 'coinbase'; }
function txId(x){
  const payload = `cerebra-tx-v1|${x.from_pub}|${x.to}|${x.amount}|${x.fee}|${x.nonce}`;
  return hexstr(sha256(enc.encode(payload + '|' + x.sig)));
}
function blockHash(b){
  const buf=new Uint8Array(124),dv=new DataView(buf.buffer);
  dv.setUint32(0,b.v,true);dv.setBigUint64(4,BigInt(b.height),true);dv.setBigUint64(12,BigInt(b.time),true);
  buf.set(unhex(b.prev),20);buf.set(unhex(b.txroot),52);buf.set(unhex(b.target),84);
  dv.setBigUint64(116,BigInt(b.nonce),true);
  return hexstr(sha256(buf));
}

function route(){
  const h = location.hash.slice(1);
  if(h.startsWith('block/')) return showBlock(parseInt(h.slice(6)));
  if(h.startsWith('tx/')) return showTx(h.slice(3));
  if(h.startsWith('addr/')) return showAddr(h.slice(5));
  if(h==='rich') return showRich();
  if(h==='mempool') return showMempool();
  showHome();
}
applyChrome();
loadStats().then(route);
setInterval(()=>{ loadStats(); if(location.hash==='' && !homeState.expanded) showHome(); }, 10000);
</script>

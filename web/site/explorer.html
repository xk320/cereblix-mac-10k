<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cerebra Explorer — обозреватель блоков CRB</title>
<style>
:root{--bg:#0a0e17;--panel:#111827;--panel2:#1a2336;--acc:#22d3ee;--acc2:#a78bfa;--txt:#e5e7eb;--mut:#8b9bb4;--ok:#34d399;--err:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:15.5px/1.55 system-ui,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1000px;margin:0 auto;padding:0 16px 60px}
nav{display:flex;align-items:center;gap:16px;padding:16px 0;flex-wrap:wrap}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#06121f;font-size:19px}
nav b{font-size:18px}
nav a{color:var(--mut);text-decoration:none;font-size:14.5px}
nav a:hover,nav a.active{color:var(--acc)}
nav .right{margin-left:auto;display:flex;gap:16px;flex-wrap:wrap}
a{color:var(--acc);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
.search{display:flex;gap:8px;margin:18px 0}
.search input{flex:1;background:#0c1322;border:1px solid #2c3a55;border-radius:10px;color:var(--txt);padding:12px 14px;font-size:15px;font-family:ui-monospace,Consolas,monospace}
.search input:focus{outline:none;border-color:var(--acc)}
.search button{background:linear-gradient(135deg,var(--acc),#0ea5e9);border:0;color:#06121f;font-weight:700;padding:0 20px;border-radius:10px;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid #233047;border-radius:12px;padding:12px;text-align:center}
.stat b{display:block;font-size:20px;color:var(--acc)}
.stat span{color:var(--mut);font-size:12px}
.card{background:var(--panel);border:1px solid #233047;border-radius:14px;padding:18px;margin-bottom:16px}
.card h2{font-size:17px;margin-bottom:12px;color:#cbd5e1}
table{width:100%;border-collapse:collapse;font-size:14px}
td,th{padding:8px 6px;border-bottom:1px solid #1f2b42;text-align:left;vertical-align:top}
th{color:var(--mut);font-weight:600}
.mono{font-family:ui-monospace,Consolas,monospace;font-size:13px}
.kv{display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-size:14px}
.kv div:nth-child(odd){color:var(--mut)}
.kv .mono{word-break:break-all}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.pill.in{background:#10331f;color:var(--ok)}
.pill.out{background:#3a1d1d;color:var(--err)}
.pill.cb{background:#241a3a;color:var(--acc2)}
.err{color:var(--err);padding:14px;background:#2a1414;border:1px solid #5a2020;border-radius:10px}
.muted{color:var(--mut)}
.back{font-size:14px;margin-bottom:10px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
<nav>
  <div class="logo">₢</div><b>Cerebra</b>
  <div class="right">
    <a href="./">О проекте</a>
    <a href="explorer.html" class="active">Обозреватель</a>
    <a href="wallet/">Кошелёк</a>
  </div>
</nav>

<div class="search">
  <input id="q" placeholder="Поиск: высота блока / хэш блока / txid / адрес crb1..." autofocus>
  <button onclick="doSearch()">Найти</button>
</div>

<div class="stats" id="stats"></div>
<div id="view"></div>
</div>

<script>
const API = 'api';
const UNIT = 1e8;
const $ = id => document.getElementById(id);
const fmt = v => (v/UNIT).toLocaleString('ru-RU',{maximumFractionDigits:8}) + ' CRB';
const tstr = t => new Date(t*1000).toLocaleString('ru-RU');
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function api(path){
  const r = await fetch(API + path);
  const j = await r.json();
  if (j && j.error) throw new Error(j.error);
  return j;
}

function link(text, fn){ return `<a onclick='${fn}'>${esc(text)}</a>`; }
const short = s => s && s.length > 20 ? s.slice(0,16)+'…' : s;

async function loadStats(){
  try{
    const s = await api('/status');
    $('stats').innerHTML = `
      <div class="stat"><b>${s.height.toLocaleString('ru-RU')}</b><span>высота</span></div>
      <div class="stat"><b>${Math.round(s.hashrate)}</b><span>H/s сети</span></div>
      <div class="stat"><b>${(s.supply/UNIT).toLocaleString('ru-RU',{maximumFractionDigits:0})}</b><span>CRB эмиссия</span></div>
      <div class="stat"><b>${(s.reward/UNIT)}</b><span>награда</span></div>
      <div class="stat"><b>${s.epoch}</b><span>эпоха</span></div>
      <div class="stat"><b>${s.mempool}</b><span>мемпул</span></div>`;
  }catch(e){ $('stats').innerHTML = `<div class="err">нода недоступна: ${esc(e.message)}</div>`; }
}

async function showLatest(){
  location.hash = '';
  try{
    const blocks = await api('/blocks?last=20');
    const mp = await api('/mempool').catch(()=>[]);
    let rows = blocks.map(b => `<tr>
      <td>${link('#'+b.height, `showBlock(${b.height})`)}</td>
      <td>${tstr(b.time)}</td>
      <td class="mono">${link(short(b.hash), `showBlock(${b.height})`)}</td>
      <td>${b.txs}</td>
      <td class="mono">${link(short(b.miner), `showAddr('${b.miner}')`)}</td>
      <td>${fmt(b.reward)}</td></tr>`).join('');
    let mpHtml = '';
    if (mp && mp.length){
      mpHtml = `<div class="card"><h2>Мемпул — ${mp.length} неподтв. транзакц.</h2><table>
        <tr><th>txid</th><th>сумма</th><th>комиссия</th></tr>` +
        mp.slice(0,20).map(t=>`<tr><td class="mono">${link(short(txid(t)), `showTx('${txid(t)}')`)}</td>
        <td>${fmt(t.amount)}</td><td>${fmt(t.fee)}</td></tr>`).join('') + `</table></div>`;
    }
    $('view').innerHTML = `<div class="card"><h2>Последние блоки</h2><table>
      <tr><th>#</th><th>время</th><th>хэш</th><th>tx</th><th>майнер</th><th>награда</th></tr>
      ${rows}</table></div>` + mpHtml;
  }catch(e){ $('view').innerHTML = `<div class="err">${esc(e.message)}</div>`; }
}
// mempool tx has no precomputed id client-side; ask node-less fallback: hash unavailable, so hide link
function txid(t){ return t.txid || ''; }

async function showBlock(h){
  location.hash = 'block/'+h;
  try{
    const b = await api('/block?h='+h);
    const txs = b.txs.map((t,i)=>{
      const cb = !t.from_pub;
      const from = cb ? 'coinbase' : addrOf(t.from_pub);
      return `<tr><td>${i}</td>
        <td>${cb?'<span class="pill cb">coinbase</span>':link(short(from),`showAddr('${from}')`)}</td>
        <td class="mono">${link(short(t.to),`showAddr('${t.to}')`)}</td>
        <td>${fmt(t.amount)}</td><td>${fmt(t.fee)}</td></tr>`;
    }).join('');
    const nav = `${h>0?link('← блок #'+(h-1),`showBlock(${h-1})`):''} &nbsp; ${link('блок #'+(h+1)+' →',`showBlock(${h+1})`)}`;
    $('view').innerHTML = `<a class="back" onclick="showLatest()">← к последним блокам</a>
      <div class="card"><h2>Блок #${b.height}</h2>
      <div class="kv">
        <div>хэш</div><div class="mono">${esc(b.prev!==undefined?blockHash(b):'')}</div>
        <div>пред. блок</div><div class="mono">${b.height>0?link(short(b.prev),`showBlock(${b.height-1})`):esc(b.prev)}</div>
        <div>время</div><div>${tstr(b.time)}</div>
        <div>target</div><div class="mono">${esc(b.target)}</div>
        <div>nonce</div><div>${b.nonce}</div>
        <div>tx root</div><div class="mono">${esc(b.txroot)}</div>
        <div>транзакций</div><div>${b.txs.length}</div>
      </div></div>
      <div class="card"><h2>Транзакции</h2><table>
        <tr><th>#</th><th>от</th><th>кому</th><th>сумма</th><th>комиссия</th></tr>${txs}</table></div>
      <div class="card" style="text-align:center">${nav}</div>`;
  }catch(e){ $('view').innerHTML = `<a class="back" onclick="showLatest()">← назад</a><div class="err">${esc(e.message)}</div>`; }
}

async function showTx(id){
  location.hash = 'tx/'+id;
  try{
    const t = await api('/tx?id='+id);
    const status = t.pending ? '<span class="pill cb">в мемпуле</span>'
      : `подтверждена в блоке ${link('#'+t.height,`showBlock(${t.height})`)}`;
    $('view').innerHTML = `<a class="back" onclick="showLatest()">← к блокам</a>
      <div class="card"><h2>Транзакция</h2><div class="kv">
        <div>txid</div><div class="mono">${esc(t.txid)}</div>
        <div>статус</div><div>${status}</div>
        ${t.pending?'':`<div>время</div><div>${tstr(t.time)}</div>
        <div>блок</div><div class="mono">${link(short(t.block_hash),`showBlock(${t.height})`)}</div>`}
        <div>от</div><div class="mono">${t.coinbase?'<span class="pill cb">coinbase</span>':link(t.from,`showAddr('${t.from}')`)}</div>
        <div>кому</div><div class="mono">${link(t.to,`showAddr('${t.to}')`)}</div>
        <div>сумма</div><div>${fmt(t.amount)}</div>
        <div>комиссия</div><div>${fmt(t.fee)}</div>
        <div>nonce</div><div>${t.nonce}</div>
      </div></div>`;
  }catch(e){ $('view').innerHTML = `<a class="back" onclick="showLatest()">← назад</a><div class="err">${esc(e.message)}</div>`; }
}

async function showAddr(addr){
  location.hash = 'addr/'+addr;
  try{
    const b = await api('/balance?addr='+addr);
    const hist = await api('/history?addr='+addr+'&limit=50').catch(()=>[]);
    const rows = (hist||[]).map(h=>{
      const out = h.from === addr;
      const peer = out ? h.to : h.from;
      return `<tr><td>${link('#'+h.height,`showBlock(${h.height})`)}</td>
        <td>${tstr(h.time)}</td>
        <td><span class="pill ${out?'out':'in'}">${out?'отправка':'получение'}</span></td>
        <td class="mono">${peer==='coinbase'?'<span class="pill cb">coinbase</span>':link(short(peer),`showAddr('${peer}')`)}</td>
        <td>${out?'−':'+'}${fmt(h.amount)}</td></tr>`;
    }).join('') || '<tr><td colspan="5" class="muted">нет транзакций</td></tr>';
    $('view').innerHTML = `<a class="back" onclick="showLatest()">← к блокам</a>
      <div class="card"><h2>Адрес</h2><div class="kv">
        <div>адрес</div><div class="mono">${esc(addr)}</div>
        <div>баланс</div><div><b style="color:var(--acc)">${fmt(b.balance)}</b></div>
        <div>nonce</div><div>${b.nonce}</div>
      </div></div>
      <div class="card"><h2>История</h2><table>
        <tr><th>блок</th><th>время</th><th>тип</th><th>контрагент</th><th>сумма</th></tr>${rows}</table></div>`;
  }catch(e){ $('view').innerHTML = `<a class="back" onclick="showLatest()">← назад</a><div class="err">${esc(e.message)}</div>`; }
}

async function doSearch(){
  const q = $('q').value.trim();
  if(!q) return;
  try{
    const r = await api('/search?q='+encodeURIComponent(q));
    if(r.type==='address') showAddr(r.value);
    else if(r.type==='tx') showTx(r.value);
    else if(r.type==='block') showBlock(r.height);
  }catch(e){ $('view').innerHTML = `<div class="err">Ничего не найдено: ${esc(e.message)}</div>`; }
}
$('q').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

// SHA-256 (pure JS, for computing block hashes and addresses without WebCrypto over HTTP)
function sha256(data){
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const len=data.length,bitLen=len*8,padded=new Uint8Array(((len+8)>>6<<6)+64);
  padded.set(data);padded[len]=0x80;const dv=new DataView(padded.buffer);
  dv.setUint32(padded.length-8,Math.floor(bitLen/0x100000000));dv.setUint32(padded.length-4,bitLen>>>0);
  const w=new Int32Array(64),rr=(x,n)=>(x>>>n)|(x<<(32-n));
  for(let i=0;i<padded.length;i+=64){
    for(let t=0;t<16;t++)w[t]=dv.getInt32(i+t*4);
    for(let t=16;t<64;t++){const s0=rr(w[t-15],7)^rr(w[t-15],18)^(w[t-15]>>>3),s1=rr(w[t-2],17)^rr(w[t-2],19)^(w[t-2]>>>10);w[t]=(w[t-16]+s0+w[t-7]+s1)|0;}
    let[a,b,c,d,e,f,g,h]=H;
    for(let t=0;t<64;t++){const S1=rr(e,6)^rr(e,11)^rr(e,25),ch=(e&f)^(~e&g),t1=(h+S1+ch+K[t]+w[t])|0,S0=rr(a,2)^rr(a,13)^rr(a,22),mj=(a&b)^(a&c)^(b&c),t2=(S0+mj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}
    H=H.map((x,j)=>(x+[a,b,c,d,e,f,g,h][j])|0);
  }
  const out=new Uint8Array(32),ov=new DataView(out.buffer);H.forEach((x,j)=>ov.setInt32(j*4,x));return out;
}
const hexstr=b=>Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
const unhex=s=>new Uint8Array(s.match(/.{2}/g).map(x=>parseInt(x,16)));
function addrOf(pubHex){ return 'crb1'+hexstr(sha256(unhex(pubHex)).slice(0,20)); }
// Recompute a block id from its header fields (matches Go HeaderBytes()).
function blockHash(b){
  const buf=new Uint8Array(124),dv=new DataView(buf.buffer);
  dv.setUint32(0,b.v,true);
  dv.setBigUint64(4,BigInt(b.height),true);
  dv.setBigUint64(12,BigInt(b.time),true);
  buf.set(unhex(b.prev),20); buf.set(unhex(b.txroot),52); buf.set(unhex(b.target),84);
  dv.setBigUint64(116,BigInt(b.nonce),true);
  return hexstr(sha256(buf));
}

function route(){
  const h = location.hash.slice(1);
  if(h.startsWith('block/')) return showBlock(parseInt(h.slice(6)));
  if(h.startsWith('tx/')) return showTx(h.slice(3));
  if(h.startsWith('addr/')) return showAddr(h.slice(5));
  showLatest();
}
loadStats(); route();
setInterval(loadStats, 20000);
</script>
</body>
</html>
